name: Validate Public Mirror

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate sanitized public mirror
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Python version
        run: python3 --version

      - name: Run public mirror validator
        run: python3 scripts/validate_public_mirror.py

      - name: Run unit tests
        run: python3 -m unittest discover -s tests
